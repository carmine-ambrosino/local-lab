#cloud-config
package_update: true
package_upgrade: true

packages:
  - sudo
  - git
  - ca-certificates
  - curl

write_files:
  - path: /opt/setup/10-base-packages.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/bin/bash
      set -euo pipefail
      echo "[INFO] Base packages already installed via cloud-init..."
  
  - path: /opt/setup/20-docker-install.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/bin/bash
      set -euo pipefail
      echo "[INFO] Removing previous versions of Docker..."
      apt-get remove -y docker.io docker-doc docker-compose podman-docker containerd runc || true

      echo "[INFO] Adding Docker GPG key..."
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
      chmod a+r /etc/apt/keyrings/docker.asc

      echo "[INFO] Adding repository..."
      codename=$(lsb_release -cs)
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
        https://download.docker.com/linux/debian $codename stable" \
        | tee /etc/apt/sources.list.d/docker.list > /dev/null

      apt-get update
      apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

      systemctl enable --now docker

  - path: /opt/setup/30-nextcloud-setup.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/bin/bash
      set -euo pipefail
      echo "[INFO] Cloning Nextcloud S3 repo..."
      git clone https://github.com/carmine-ambrosino/nextcloud-s3.git /opt/nextcloud-s3
      cd /opt/nextcloud-s3/compose
      cp .env.example .env
      echo "[INFO] Starting containers..."
      docker compose up -d
      
  - path: /opt/setup/40-netdata-setup.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/bin/bash
      set -euo pipefail
      echo "[INFO] Netdata installation..."
      curl https://get.netdata.cloud/kickstart.sh > /tmp/netdata-kickstart.sh && sh /tmp/netdata-kickstart.sh --stable-channel --disable-telemetry
      echo "[INFO] COMPLETE: Netdata installation..."

runcmd:
  - /opt/setup/10-base-packages.sh
  - /opt/setup/20-docker-install.sh
  - /opt/setup/30-nextcloud-setup.sh
  - /opt/setup/40-netdata-setup.sh

growpart:
  mode: auto
  devices: ['/']
  ignore_growroot_disabled: false

